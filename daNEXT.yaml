# ===================================================
# DNS 方案: Fake-IP
# ===================================================
dns:
  enable: true
  ipv6: false
  listen: :23453
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 180.76.76.76
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: rule
  respect-rules: false
  prefer-h3: false
  fake-ip-filter:
    - RULE-SET,cn,real-ip
    - RULE-SET,private,real-ip
    - RULE-SET,geolocation-!cn,fake-ip
    - MATCH,real-ip
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 223.5.5.5
  nameserver-policy:
    "+.steampowered.com": "223.5.5.5"
# ----- 请勿改动 -----
port: 7890
proxies:

# ===================================================
# 机场配置模块
# ===================================================
provider_config: &provider_config
  type: http
  interval: 86400
  proxy: DIRECT
  user-agent: clash.meta.mihomo
  health-check:
    enable: true
    url: http://www.apple.com/library/test/success.html
    interval: 300

# ===================================================
# 订阅配置模块
# ===================================================
proxy-providers:
  V2R:
    url: #修改你的机场1订阅地址
    <<: *provider_config
    override:
      additional-prefix: "[V2R] "
      skip-cert-verify: true
      udp: true
  SSR:
    url: #修改你的机场2订阅地址
    <<: *provider_config
    override:
      additional-prefix: "[SSR] "
      skip-cert-verify: true
      udp: true

# ===================================================
# 锚点配置模块
# ===================================================
standard_proxies: &standard_proxies
  type: select
  proxies:
    - DIRECT
    - 🚀 总模式
    - 🇭🇰 香港节点
    - 🇺🇸 美国节点
    - 🇯🇵 日本节点
    - 🏝️ 台湾节点
    - 🇰🇷 韩国节点
    - 🇸🇬 狮城节点
    - ⚙️ 手动切换

all_proxies: &all_proxies
  type: select
  proxies:
    - ♻️ 自动选择
    - 🇭🇰 香港节点
    - 🇺🇸 美国节点
    - 🇯🇵 日本节点
    - 🏝️ 台湾节点
    - 🇰🇷 韩国节点
    - 🇸🇬 狮城节点
    - ⚙️ 手动切换
    - 🌏️ 其他节点
    - DIRECT

filter_proxies: &filter_proxies
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 100
  include-all: true

# ===================================================
# 域名策略组模块
# ===================================================
proxy-groups:
  - name: 🚀 总模式
    <<: *all_proxies

  - name: ⚙️ 手动切换
    type: select
    include-all: true

  - name: ♻️ 自动选择
    <<: *filter_proxies

  - name: 🤖 AI
    <<: *standard_proxies

  - name: 📲 社交网络
    <<: *standard_proxies

  - name: 📀 音视频
    <<: *standard_proxies

  - name: 📓 Github
    <<: *standard_proxies

  - name: ☁️ PikPak
    <<: *standard_proxies

  - name: ㊙️ Pornmeta
    <<: *standard_proxies

  - name: 🔞 Porn
    <<: *standard_proxies

  - name: 🍎 苹果服务
    <<: *standard_proxies

  - name: Ⓜ️ 微软服务
    <<: *standard_proxies

  - name: 🎮 游戏平台
    <<: *standard_proxies

  - name: 📷️ 摄影美学
    <<: *standard_proxies

  - name: 🚨 Cloudflare
    <<: *standard_proxies

  - name: 🌐 国外网站
    <<: *standard_proxies

  - name: ⛔️ 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - PASS

  - name: 🐟 漏网之鱼
    <<: *standard_proxies

  # ----- 国家与地区过滤 -----
  - name: 🇭🇰 香港节点
    <<: *filter_proxies
    filter: '^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)\b))).*$'

  - name: 🇺🇸 美国节点
    <<: *filter_proxies
    filter: '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States)\b))).*$'

  - name: 🇯🇵 日本节点
    <<: *filter_proxies
    filter: '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\b))).*$'

  - name: 🏝️ 台湾节点
    <<: *filter_proxies
    filter: "^(?=.*((?i)🇹🇼|TW|台湾)).*$"

  - name: 🇰🇷 韩国节点
    <<: *filter_proxies
    filter: '^(?=.*((?i)🇰🇷|韩国|首尔|(\b(KR|Korea)\b))).*$'

  - name: 🇸🇬 狮城节点
    <<: *filter_proxies
    filter: '^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)\b))).*$'

  - name: 🌏️ 其他节点
    <<: *filter_proxies
    filter: "^(?!.*(🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|🇭🇰|香港|HK|Hong|🇯🇵|日本|川日|东京|大阪|泉日|埼玉|JP|Japan|🇨🇳|台湾|🇹🇼|TW|🇸🇬|新加坡|狮|SG|Singapore|🇰🇷|韩国|首尔|KR|Korea)).*$"

# ===================================================
# 规则集模块
# ===================================================
rule-anchor:
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs

